<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OG's Quiz Battle | SlickLab.Digital</title>
<meta name="description" content="ServiceNow CSA exam trainer for the crew &mdash; topic lessons, flashcards, mock exams, and live quiz battles.">
<link rel="preload" href="assets/backgrounds/bg_outside.webp" as="image" type="image/webp">
<link rel="preload" href="assets/icons/logo.webp" as="image" type="image/webp">
<link rel="stylesheet" href="assets/css/style.css">
<style>
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
  }
  .v2-badge {
    display: inline-block;
    background: linear-gradient(135deg, #ffd700, #ffb300);
    color: #1a1a2e;
    font-size: 0.65rem;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 999px;
    vertical-align: middle;
    box-shadow: 0 2px 6px rgba(255,179,0,0.4);
  }

  body {
    background: var(--bg);
    min-height: 100vh;
    padding: 48px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* .login-wrap is the shared coordinate box: .login-stage (background +
     character/logo art, always locked to its 16:10 ratio so the art scales
     identically at every width) and .login-form-overlay are SIBLINGS inside
     it, not parent/child. That split matters on mobile: the form switches
     to position:static there, and because it's a sibling rather than a
     child clipped inside the (out-of-flow-art-only) stage, it naturally
     flows below the art instead of overlapping it.
     flex-shrink:0 matters here -- without it, aspect-ratio + overflow:hidden
     inside a flex parent lets a box collapse far below its intended width
     on narrow viewports (a real bug hit and fixed earlier). */
  .login-wrap {
    position: relative;
    width: min(94vw, 1100px);
    flex-shrink: 0;
    margin: 0 auto;
  }
  .login-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 10;
    border-radius: 16px;
    overflow: hidden;
    background: #05060c url('assets/backgrounds/bg_outside.webp') no-repeat center center;
    background-size: cover;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .cluster-char {
    position: absolute;
    /* Purely decorative -- must not intercept clicks. Without this, the
       transparent parts of the PNG/WebP still count as part of the element's
       clickable bounding box, so any overlap with the form below swallows
       clicks/keyboard focus meant for the input underneath. */
    pointer-events: none;
    /* crisp near-edge rim + soft ambient bloom, instead of one blurry layer */
    filter:
      drop-shadow(0 0 3px var(--neon-cyan))
      drop-shadow(0 0 9px var(--neon-cyan))
      drop-shadow(0 0 22px var(--neon-magenta));
  }
  .cluster-char img { display: block; width: 100%; height: auto; }
  #clusterDigi { top: 2.2%; left: 37%; width: 26.5%; z-index: 2; }
  #clusterBea { top: 8.4%; left: 43.8%; width: 25.3%; z-index: 2; }
  #clusterVhine { top: 13.1%; left: 34.2%; width: 20%; z-index: 3; }

  .cluster-main-logo {
    position: absolute; top: 22.4%; left: 24.8%; width: 50%; z-index: 4;
    /* Same reasoning as .cluster-char -- this is the element that was
       actually reported blocking the username field's clicks. */
    pointer-events: none;
    filter:
      drop-shadow(0 0 4px var(--neon-gold))
      drop-shadow(0 0 11px var(--neon-cyan))
      drop-shadow(0 0 28px var(--neon-magenta));
  }
  .cluster-main-logo img { display: block; width: 100%; height: auto; }

  .login-form-overlay {
    position: absolute; top: 61%; left: 37.5%; width: 26%; z-index: 1;
  }

  .input-group { position: relative; margin-bottom: 14px; }
  .input-group input {
    width: 100%; padding: 12px 16px; box-sizing: border-box;
    background: rgba(10,10,22,0.82); border: 2px solid var(--neon-cyan); border-radius: 10px;
    color: #fff; font-size: 0.95rem; outline: none;
    box-shadow: 0 0 12px rgba(0,243,255,0.3);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    margin-bottom: 0;
  }
  .input-group input::placeholder { color: #88a0c0; }
  .input-group input:focus {
    border-color: var(--neon-magenta);
    box-shadow: 0 0 20px rgba(255,0,127,0.5), inset 0 0 8px rgba(255,0,127,0.25);
    background: rgba(20,10,30,0.9);
  }
  .toggle-password {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: var(--neon-cyan); font-size: 1.05rem;
    text-shadow: 0 0 8px var(--neon-cyan);
    user-select: none;
  }
  .login-btn {
    position: relative; overflow: hidden;
    width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #fff;
    background: linear-gradient(135deg, var(--accent), var(--neon-cyan));
    color: #fff; font-size: 0.95rem; font-weight: 800; letter-spacing: 1.2px;
    text-transform: uppercase; cursor: pointer; margin-top: 14px;
    box-shadow: 0 0 18px rgba(0,243,255,0.5);
    transition: box-shadow 0.2s ease, transform 0.2s ease, background 0.2s ease;
  }
  .login-btn::after {
    content: '';
    position: absolute; top: 0; left: -60%; width: 35%; height: 100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: skewX(-20deg);
    transition: left 0.5s ease;
    pointer-events: none;
  }
  .login-btn:hover::after { left: 130%; }
  .login-btn:hover {
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
    box-shadow: 0 0 26px rgba(255,0,127,0.55), 0 0 14px rgba(0,243,255,0.4);
    transform: translateY(-2px);
  }
  .login-btn:active { transform: scale(0.97); }
  @media (prefers-reduced-motion: reduce) {
    .login-btn::after { transition: none; }
  }
  #loginError {
    min-height: 1.1em; text-align: center; margin: 10px 0 0; font-size: 0.82rem;
    text-shadow: 0 0 8px rgba(239,90,90,0.6);
  }
  .login-identity { text-align: center; margin-top: 14px; font-size: 0.72rem; color: var(--text-dim); }

  /* Below ~820px a 26%-wide overlay gets too cramped to use comfortably
     (phones AND small tablets), so the form drops out of the overlay and
     flows full-width below the art banner instead. .login-stage keeps its
     16:10 ratio unchanged here -- the art was never the problem, it always
     scaled fine; only the form needs different treatment at this size. */
  @media (max-width: 820px) {
    .login-form-overlay {
      position: static; width: min(100%, 360px); margin: 20px auto 0;
    }
    .input-group input, .login-btn { font-size: 1rem; padding: 14px 16px; }
  }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-stage" id="loginStage">
    <div id="clusterDigi" class="cluster-char"><img src="assets/backgrounds/logo_digi.webp" alt=""></div>
    <div id="clusterBea" class="cluster-char"><img src="assets/backgrounds/logo_bea.webp" alt=""></div>
    <div id="clusterVhine" class="cluster-char"><img src="assets/backgrounds/logo_vhine.webp" alt=""></div>
    <div class="cluster-main-logo"><img src="assets/icons/logo.webp" alt="OG's Quiz Battle — Mock Exam &amp; Flashcards"></div>
  </div>

  <div class="login-form-overlay">
    <form id="loginForm">
      <div class="input-group">
        <label for="loginUsername" class="sr-only">Username</label>
        <input id="loginUsername" name="username" type="text" placeholder="Username" autocomplete="username" required>
      </div>
      <div class="input-group" style="margin-top: 12px;">
        <label for="loginPassword" class="sr-only">Password</label>
        <input id="loginPassword" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
        <span class="toggle-password" id="togglePassword" role="button" tabindex="0" aria-label="Show password">&#128065;</span>
      </div>
      <div class="error-msg" id="loginError"></div>
      <button type="submit" class="login-btn" id="loginBtn">Log In</button>
    </form>
    <div class="login-identity">ServiceNOW <span class="brand-accent">| CebuPips | SlickPrepTime</span> <span class="v2-badge">v3.0</span></div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  try {
    await API.login({ username, password });
    sessionStorage.setItem('showConfidentialityNotice', '1');
    if (localStorage.getItem('seenV2Announcement') !== '1') {
      sessionStorage.setItem('showV2Announcement', '1');
    }
    window.location.href = 'dashboard.html';
  } catch (err) {
    errEl.textContent = err.message;
  }
});

function togglePasswordVisibility() {
  const field = document.getElementById('loginPassword');
  const btn = document.getElementById('togglePassword');
  const show = field.getAttribute('type') === 'password';
  field.setAttribute('type', show ? 'text' : 'password');
  btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
}
document.getElementById('togglePassword').addEventListener('click', togglePasswordVisibility);
document.getElementById('togglePassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePasswordVisibility(); }
});

// If already logged in, skip straight to dashboard.
API.me().then((me) => { if (me.authenticated) window.location.href = 'dashboard.html'; }).catch(() => {});
</script>
</body>
</html>
